# ============================================================
# Inventory — Tailscale-first (pakai TS IP setelah bootstrap)
# ============================================================

all:
  children:
    # Node utama — K3s control plane + workers
    k3s_nodes:
      hosts:
        # Ganti dengan hostname Tailscale setelah node join
        # node1:
        #   ansible_host: 100.x.y.z    # Tailscale IP
        # node2:
        #   ansible_host: 100.x.y.z

      vars:
        ansible_user: root
        tailscale_args: "--accept-routes --advertise-tags=tag:k3s-node"

    # VPS standalone — PostgreSQL, MySQL, Observability
    infra:
      hosts:
        # Uncomment dan isi:
        # vps1:
        #   ansible_host: 192.168.1.10  # IP awal (sebelum Tailscale)

    # Node yang expose service ke internet via Cloudflare Tunnel
    tunnel_nodes:
      hosts:
        # vps1:
        #   ansible_host: 100.x.y.z  # Tailscale IP

      vars:
        cloudflared_mode: token  # "token" atau "config"
        # Kalau pakai config mode:
        # cloudflared_mode: config
        # cf_tunnel_id: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
        # cf_ingress_rules:
        #   - hostname: grafana.domain.com
        #     service: http://localhost:3000
        #   - hostname: api.domain.com
        #     service: http://localhost:8080
