# ============================================================
# Inventory — Tailscale mesh across data centers
# ============================================================
#
# Prasyarat setiap node:
#   1. Ubuntu 22.04+ / Debian Bookworm
#   2. SSH key dari control machine sudah di-copy ke node
#   3. User punya passwordless sudo
#
# Cara pakai multi-node:
#   1. Uncomment node yang mau dipakai
#   2. Ganti ansible_host dengan Tailscale IP masing-masing
#   3. Jalankan: cd ansible && ansible-playbook site.yml -K
#
# Single-node (default):
#   ./setup.sh

all:
  children:
    # ═══════════════════════════════════════════════════════
    # K3s Control Plane — minimal 1 node
    # ═══════════════════════════════════════════════════════
    k3s_server:
      hosts:
        # ── Node 1 (aktif) ──
        localhost:
          ansible_connection: local
          ansible_user: "{{ lookup('env', 'ANSIBLE_USER') | default(lookup('env', 'USER'), true) }}"
          ansible_python_interpreter: "{{ lookup('env', 'ANSIBLE_PYTHON') | default('/usr/bin/python3', true) }}"

        # ── Node 2 (uncomment untuk tambah server) ──
        # server-dc2:
        #   ansible_host: 100.64.0.2         # Tailscale IP node ini
        #   ansible_user: faisal
        #   ansible_connection: ssh
        #   ansible_python_interpreter: /usr/bin/python3

        # ── Node 3 ──
        # server-dc3:
        #   ansible_host: 100.64.0.3
        #   ansible_user: faisal
        #   ansible_connection: ssh
        #   ansible_python_interpreter: /usr/bin/python3

      vars:
        tailscale_args: "{{ lookup('env', 'TAILSCALE_ARGS') | default('--accept-routes', true) }}"
        letsencrypt_email: "{{ lookup('env', 'LETSENCRYPT_EMAIL') | default('faisallionel@gmail.com', true) }}"
        domain: "{{ lookup('env', 'DOMAIN') | default('faisalaffan.com', true) }}"

    # ═══════════════════════════════════════════════════════
    # K3s Workers — opsional, 0..N node
    # ═══════════════════════════════════════════════════════
    k3s_agent:
      hosts:
        # ── Agent 1 (uncomment untuk tambah worker) ──
        # agent-dc2:
        #   ansible_host: 100.64.0.4         # Tailscale IP node ini
        #   ansible_user: faisal
        #   ansible_connection: ssh
        #   ansible_python_interpreter: /usr/bin/python3

        # ── Agent 2 ──
        # agent-dc3:
        #   ansible_host: 100.64.0.5
        #   ansible_user: faisal
        #   ansible_connection: ssh
        #   ansible_python_interpreter: /usr/bin/python3
