# ============================================================
# Inventory — Tailscale-first K3s Cluster
#
# IP awal (sebelum Tailscale ready). Setelah bootstrap,
# update ke Tailscale IP untuk subsequent runs.
# ============================================================

all:
  children:
    k3s_server:
      hosts:
        server1:
          ansible_host: 192.168.1.10
          ansible_user: ubuntu

      vars:
        tailscale_args: "--accept-routes --advertise-tags=tag:k3s-server"

    k3s_agent:
      hosts:
        # agent1:
        #   ansible_host: 192.168.1.11
        #   ansible_user: ubuntu
        # agent2:
        #   ansible_host: 192.168.1.12
        #   ansible_user: ubuntu

      vars:
        tailscale_args: "--accept-routes --advertise-tags=tag:k3s-agent"
