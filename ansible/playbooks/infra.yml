# ============================================================
# Infra — Clone repo, start PostgreSQL + MySQL + Observability
# ============================================================
- name: Deploy Infrastructure
  hosts: infra
  become: true
  vars:
    infra_repo: "{{ infra_repo }}"
    infra_dir: "{{ infra_dir }}"
    infra_branch: "{{ infra_branch }}"

  tasks:
    - name: Create infra directory
      file:
        path: "{{ infra_dir }}"
        state: directory
        owner: root
        group: root

    - name: Clone infra-light repo
      git:
        repo: "{{ infra_repo }}"
        dest: "{{ infra_dir }}"
        version: "{{ infra_branch }}"
        accept_hostkey: true
        force: true
      when: not ansible_check_mode

    - name: Copy .env files from examples
      copy:
        src: "{{ infra_dir }}/{{ item }}/.env.example"
        dest: "{{ infra_dir }}/{{ item }}/.env"
        remote_src: true
        force: false
      loop:
        - postgres
        - mysql
        - observability

    - name: Inject credentials into .env files
      lineinfile:
        path: "{{ infra_dir }}/{{ item.file }}"
        regexp: "^{{ item.key }}="
        line: "{{ item.key }}={{ item.value }}"
      loop:
        - { file: 'postgres/.env', key: 'POSTGRES_PASSWORD', value: "{{ vault_pg_superuser_password }}" }
        - { file: 'postgres/.env', key: 'APP_PASSWORD', value: "{{ vault_pg_app_password }}" }
        - { file: 'mysql/.env', key: 'MYSQL_ROOT_PASSWORD', value: "{{ vault_mysql_root_password }}" }
        - { file: 'mysql/.env', key: 'MYSQL_PASSWORD', value: "{{ vault_mysql_app_password }}" }
        - { file: 'observability/.env', key: 'GRAFANA_ADMIN_PASSWORD', value: "{{ vault_grafana_admin_password }}" }

    - name: Start PostgreSQL
      docker_compose_v2:
        project_src: "{{ infra_dir }}/postgres"
        state: present

    - name: Start MySQL
      docker_compose_v2:
        project_src: "{{ infra_dir }}/mysql"
        state: present

    - name: Start Observability stack
      docker_compose_v2:
        project_src: "{{ infra_dir }}/observability"
        state: present

    - debug:
        msg: |
          ✅ Infrastructure deployed on {{ inventory_hostname }}
          PostgreSQL:  {{ ansible_host }}:5432
          MySQL:       {{ ansible_host }}:3306
          Grafana:     {{ ansible_host }}:3000 (admin / see vault)
