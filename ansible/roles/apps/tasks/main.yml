---
# Role: apps — Deploy infrastructure services ke K3s
# Idempotent: kubectl apply. Variables from DEVOPS/.env

- name: Create infra namespace
  command: kubectl create namespace infra
  register: ns_result
  failed_when: false
  changed_when: "'created' in ns_result.stdout"

- name: Create infrastructure secrets from .env
  shell: |
    kubectl apply -f - <<'EOF'
    apiVersion: v1
    kind: Secret
    metadata:
      name: infra-secrets
      namespace: infra
    type: Opaque
    stringData:
      POSTGRES_USER: "{{ lookup('env', 'PG_SUPERUSER') }}"
      POSTGRES_PASSWORD: "{{ vault_pg_superuser_password }}"
      POSTGRES_DB: "{{ lookup('env', 'PG_DATABASE') }}"
      MYSQL_ROOT_PASSWORD: "{{ vault_mysql_root_password }}"
      MYSQL_DATABASE: "{{ lookup('env', 'MYSQL_DATABASE') }}"
      MYSQL_USER: "{{ lookup('env', 'MYSQL_USER') }}"
      MYSQL_PASSWORD: "{{ vault_mysql_app_password }}"
      GF_SECURITY_ADMIN_USER: "{{ lookup('env', 'GRAFANA_ADMIN_USER') }}"
      GF_SECURITY_ADMIN_PASSWORD: "{{ vault_grafana_admin_password }}"
      GF_INSTALL_PLUGINS: "{{ lookup('env', 'GRAFANA_PLUGINS') }}"
    EOF
  register: secret_apply
  changed_when: secret_apply.rc == 0

- name: Deploy all infrastructure services
  template:
    src: all-services.yaml.j2
    dest: /tmp/infra-all-services.yaml

- name: Apply manifests to K3s
  command: kubectl apply -f /tmp/infra-all-services.yaml
  register: apply_result
  changed_when: "'unchanged' not in apply_result.stdout"

- name: Show resources
  shell: |
    kubectl get pods,svc,pvc -n infra -o wide 2>/dev/null || true
  register: status
  changed_when: false

- debug:
    var: status.stdout_lines
