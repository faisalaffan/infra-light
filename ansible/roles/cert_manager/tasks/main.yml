---
# Role: cert_manager — TLS certificates via Let's Encrypt
# Idempotent: cek existing resource sebelum deploy

- name: Check if cert-manager HelmChart exists
  command: kubectl get helmchart -n kube-system cert-manager -o name
  register: cm_helm_check
  failed_when: false
  changed_when: false

- name: Deploy cert-manager CRDs + controller
  shell: |
    kubectl apply -f - <<'EOF'
    apiVersion: helm.cattle.io/v1
    kind: HelmChart
    metadata:
      name: cert-manager
      namespace: kube-system
    spec:
      repo: https://charts.jetstack.io
      chart: cert-manager
      version: v1.17.1
      targetNamespace: cert-manager
      createNamespace: true
      valuesContent: |-
        installCRDs: true
        prometheus:
          enabled: false
    EOF
  when: cm_helm_check.rc != 0
  register: cm_apply
  changed_when: cm_apply.rc == 0

- name: Wait for cert-manager pods
  shell: |
    kubectl wait --namespace cert-manager \
      --for=condition=ready pod \
      --selector=app.kubernetes.io/instance=cert-manager \
      --timeout=120s
  register: cert_ready
  retries: 24
  delay: 5
  until: cert_ready.rc == 0
  changed_when: false

- name: Check if ClusterIssuers exist
  command: kubectl get clusterissuer letsencrypt-prod -o name
  register: issuer_check
  failed_when: false
  changed_when: false

- name: Deploy Let's Encrypt ClusterIssuers
  shell: |
    kubectl apply -f - <<'EOF'
    apiVersion: cert-manager.io/v1
    kind: ClusterIssuer
    metadata:
      name: letsencrypt-staging
    spec:
      acme:
        email: "{{ letsencrypt_email | default('faisallionel@gmail.com') }}"
        server: https://acme-staging-v02.api.letsencrypt.org/directory
        privateKeySecretRef:
          name: letsencrypt-staging-key
        solvers:
          - http01:
              ingress:
                class: nginx
    ---
    apiVersion: cert-manager.io/v1
    kind: ClusterIssuer
    metadata:
      name: letsencrypt-prod
    spec:
      acme:
        email: "{{ letsencrypt_email | default('faisallionel@gmail.com') }}"
        server: https://acme-v02.api.letsencrypt.org/directory
        privateKeySecretRef:
          name: letsencrypt-prod-key
        solvers:
          - http01:
              ingress:
                class: nginx
    EOF
  when: issuer_check.rc != 0
  register: issuer_apply
  changed_when: issuer_apply.rc == 0

- debug:
    msg: "✅ cert-manager ready — ClusterIssuers: staging + prod"
