---
# Role: cloudflared — Cloudflare Tunnel (public exposure)

- name: Detect OS codename
  shell: . /etc/os-release && echo $VERSION_CODENAME
  register: os_codename
  changed_when: false

- name: Add Cloudflare GPG key
  shell: |
    curl -fsSL https://pkg.cloudflare.com/cloudflare-main.gpg \
      | tee /usr/share/keyrings/cloudflare-main.gpg > /dev/null
  args:
    creates: /usr/share/keyrings/cloudflare-main.gpg

- name: Add Cloudflare repository
  shell: |
    echo "deb [signed-by=/usr/share/keyrings/cloudflare-main.gpg] \
      https://pkg.cloudflare.com/cloudflared {{ os_codename.stdout }} main" \
      | tee /etc/apt/sources.list.d/cloudflared.list
  args:
    creates: /etc/apt/sources.list.d/cloudflared.list

- name: Install cloudflared
  apt:
    name: cloudflared
    update_cache: true
    state: latest

- name: Install tunnel service (token mode)
  command: cloudflared service install {{ vault_cf_tunnel_token }}
  args:
    creates: /etc/systemd/system/cloudflared.service
  register: cf_install
  failed_when:
    - cf_install.rc != 0
    - "'already' not in cf_install.stderr | default('')"

- name: Enable & start cloudflared
  systemd:
    name: cloudflared
    enabled: true
    state: started

- debug:
    msg: "✅ Cloudflare Tunnel running on {{ inventory_hostname }}"
