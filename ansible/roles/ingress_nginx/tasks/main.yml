---
# Role: ingress_nginx — Nginx Ingress Controller
# Idempotent: cek existing resource sebelum deploy

- name: Check if ingress-nginx namespace exists
  command: kubectl get namespace ingress-nginx -o name
  register: ns_check
  failed_when: false
  changed_when: false

- name: Create ingress-nginx namespace
  command: kubectl create namespace ingress-nginx
  when: ns_check.rc != 0
  changed_when: true

- name: Check if ingress-nginx HelmChart exists
  command: kubectl get helmchart -n kube-system ingress-nginx -o name
  register: helm_check
  failed_when: false
  changed_when: false

- name: Deploy ingress-nginx controller
  shell: |
    kubectl apply -f - <<'EOF'
    apiVersion: helm.cattle.io/v1
    kind: HelmChart
    metadata:
      name: ingress-nginx
      namespace: kube-system
    spec:
      repo: https://kubernetes.github.io/ingress-nginx
      chart: ingress-nginx
      version: 4.12.1
      targetNamespace: ingress-nginx
      valuesContent: |-
        controller:
          kind: DaemonSet
          hostPort:
            enabled: true
            ports:
              http: 80
              https: 443
          service:
            type: ClusterIP
          metrics:
            enabled: true
            serviceMonitor:
              enabled: false
          config:
            use-forwarded-headers: "true"
            compute-full-forwarded-for: "true"
            enable-real-ip: "true"
            proxy-body-size: "100m"
            proxy-buffer-size: "16k"
            client-max-body-size: "100m"
    EOF
  when: helm_check.rc != 0
  register: helm_apply
  changed_when: helm_apply.rc == 0

- name: Wait for ingress-nginx pods ready
  shell: |
    kubectl wait --namespace ingress-nginx \
      --for=condition=ready pod \
      --selector=app.kubernetes.io/component=controller \
      --timeout=120s
  register: ingress_ready
  retries: 24
  delay: 5
  until: ingress_ready.rc == 0
  changed_when: false

- debug:
    msg: "✅ ingress-nginx ready — hostPort 80/443"
