---
# Role: k3s_agent — K3s worker node
# Requires: tailscale + k3s_server roles applied first

- name: Get server Tailscale IP from hostvars
  set_fact:
    k3s_server_ip: "{{ hostvars[groups['k3s_server'][0]]['tailscale_ipv4'] }}"
    k3s_server_token: "{{ hostvars[groups['k3s_server'][0]]['k3s_token'] }}"

- name: Install K3s agent
  shell: |
    curl -sfL https://get.k3s.io | sh -s - agent \
      --server=https://{{ k3s_server_ip }}:6443 \
      --token={{ k3s_server_token }} \
      --node-ip={{ tailscale_ipv4 }} \
      --flannel-iface=tailscale0
  args:
    creates: /usr/local/bin/k3s
  register: k3s_agent_install
  changed_when: k3s_agent_install.rc == 0

- name: Wait for K3s to be ready
  wait_for:
    path: /etc/rancher/k3s/k3s.yaml
    timeout: 60

- name: Get cni0 bridge IP
  shell: ip -4 addr show cni0 2>/dev/null | grep -oP '(?<=inet\s)\d+(\.\d+){3}' || echo "10.42.0.1"
  register: cni0_ip
  changed_when: false

- name: Configure k3s agent — add cni0 IP to kubelet node-ip
  copy:
    dest: /etc/rancher/k3s/config.yaml
    content: |
      kubelet-arg:
        - "node-ip={{ tailscale_ipv4 }},{{ cni0_ip.stdout }}"
    owner: root
    mode: 0644
  notify: restart k3s-agent

- debug:
    msg: "✅ K3s agent joined — {{ ansible_facts.hostname }} → server {{ k3s_server_ip }}"
