---
# Role: k3s_agent — K3s worker node
# Requires: tailscale + k3s_server roles applied first

- name: Get server Tailscale IP from hostvars
  set_fact:
    k3s_server_ip: "{{ hostvars[groups['k3s_server'][0]]['tailscale_ipv4'] }}"
    k3s_server_token: "{{ hostvars[groups['k3s_server'][0]]['k3s_token'] }}"

- name: Install K3s agent
  shell: |
    curl -sfL https://get.k3s.io | sh -s - agent \
      --server=https://{{ k3s_server_ip }}:6443 \
      --token={{ k3s_server_token }} \
      --node-ip={{ tailscale_ipv4 }} \
      --flannel-iface=tailscale0
  args:
    creates: /usr/local/bin/k3s
  register: k3s_agent_install
  changed_when: k3s_agent_install.rc == 0

- debug:
    msg: "✅ K3s agent joined — {{ inventory_hostname }} → server {{ k3s_server_ip }}"
