---
# ============================================================
# site.yml — Bootstrap semua node dari 0
#
# Flow:
#   1. Tailscale → semua node join mesh, dapat TS IP
#   2. K3s server → control plane di server node
#   3. K3s agents → worker nodes join cluster
#   4. Cloudflared → public exposure via CF Tunnel
#
# Usage:
#   ansible-playbook site.yml -i inventory/hosts.yml --ask-vault-pass
# ============================================================

- name: 1/4 — Tailscale Mesh (all nodes)
  hosts: all
  become: true
  roles:
    - tailscale

- name: 2/4 — K3s Server (control plane)
  hosts: k3s_server
  become: true
  roles:
    - k3s_server

- name: 3/4 — K3s Agents (workers)
  hosts: k3s_agent
  become: true
  roles:
    - k3s_agent

- name: 4/4 — Cloudflare Tunnel (public exposure)
  hosts: k3s_server
  become: true
  roles:
    - cloudflared
