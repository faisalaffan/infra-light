---
# ============================================================
# site.yml — Bootstrap semua node dari 0
# Flow: Tailscale → K3s → Ingress → Cert-Manager → Apps → CF Tunnel
# ============================================================

- name: 1/6 — Tailscale Mesh (all nodes)
  hosts: all
  become: true
  roles:
    - tailscale

- name: 2/6 — K3s Server (control plane)
  hosts: k3s_server
  become: true
  roles:
    - k3s_server

- name: 3/6 — K3s Agents (workers)
  hosts: k3s_agent
  become: true
  roles:
    - k3s_agent

- name: 4/6 — Ingress NGINX + Cert-Manager
  hosts: k3s_server
  roles:
    - ingress_nginx
    - cert_manager

- name: 5/6 — Infrastructure Services (PG + MySQL + Observability)
  hosts: k3s_server
  roles:
    - apps

- name: 6/6 — Cloudflare Tunnel (public exposure)
  hosts: k3s_server
  become: true
  roles:
    - cloudflared
