---
# ============================================================
# site.yml — Host OS bootstrap (Tailscale → K3s)
# Cluster-level services handled by kubernetes/ (kustomize + helmcharts)
# ============================================================

- name: 1/3 — Tailscale Mesh (all nodes)
  hosts: all
  become: true
  roles:
    - tailscale

- name: 2/3 — K3s Server (control plane)
  hosts: k3s_server
  become: true
  roles:
    - k3s_server

- name: 3/3 — K3s Agents (workers)
  hosts: k3s_agent
  become: true
  roles:
    - k3s_agent
