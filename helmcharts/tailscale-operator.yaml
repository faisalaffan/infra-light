# Tailscale Kubernetes Operator — expose services directly on tailnet
# Requires: OAuth client in Tailscale admin console
# See: https://tailscale.com/docs/kubernetes-operator
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: tailscale-operator
  namespace: tailscale
spec:
  chart: tailscale-operator
  repo: https://pkgs.tailscale.com/helmcharts
  targetNamespace: tailscale
  createNamespace: true
  valuesContent: |-
    oauth:
      clientId: "${TAILSCALE_OAUTH_CLIENT_ID}"
      clientSecret: "${TAILSCALE_OAUTH_CLIENT_SECRET}"
    operatorConfig:
      defaultTags:
        - tag:k8s-operator
