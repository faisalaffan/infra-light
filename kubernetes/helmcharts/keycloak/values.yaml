replicaCount: 1

image:
  repository: quay.io/keycloak/keycloak
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

hostname: keycloak.faisalaffan.com
hostnamePort: 443
hostnameStrict: true
proxyHeaders: xforwarded
httpEnabled: true

adminUser: admin
adminPassword: admin

resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1536Mi"
    cpu: "1000m"

javaOpts: "-Xms256m -Xmx768m"

livenessProbe:
  initialDelaySeconds: 60
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 5

realmJson: |
  {
    "id": "geostack",
    "realm": "geostack",
    "displayName": "Geostack",
    "enabled": true,
    "sslRequired": "none",
    "registrationAllowed": false,
    "loginWithEmailAllowed": true,
    "duplicateEmailsAllowed": false,
    "resetPasswordAllowed": true,
    "editUsernameAllowed": false,
    "bruteForceProtected": true,
    "clients": [
      {
        "clientId": "geostack-web",
        "name": "Geostack Web",
        "description": "React frontend",
        "enabled": true,
        "publicClient": true,
        "redirectUris": [
          "http://localhost:5173/*",
          "http://localhost:5173/silent-check-sso.html",
          "http://geostack.local/*",
          "http://geostack.local/silent-check-sso.html",
          "https://geostack.faisalaffan.com/*",
          "https://geostack.faisalaffan.com/silent-check-sso.html"
        ],
        "webOrigins": [
          "http://localhost:5173",
          "http://geostack.local",
          "https://geostack.faisalaffan.com"
        ],
        "standardFlowEnabled": true,
        "implicitFlowEnabled": false,
        "directAccessGrantsEnabled": true,
        "serviceAccountsEnabled": false
      },
      {
        "clientId": "geostack-api",
        "name": "Geostack API",
        "description": "Backend API (bearer-only)",
        "enabled": true,
        "publicClient": false,
        "bearerOnly": true,
        "standardFlowEnabled": false,
        "directAccessGrantsEnabled": false,
        "serviceAccountsEnabled": false
      }
    ],
    "users": [
      {
        "username": "demo_admin",
        "email": "admin@geostack.demo",
        "enabled": true,
        "emailVerified": true,
        "credentials": [
          {
            "type": "password",
            "value": "demo123",
            "temporary": false
          }
        ],
        "realmRoles": ["admin"],
        "attributes": {
          "org_id": "d290f1ee-6c54-4b01-90e6-d701748f0851",
          "org_slug": "demo_telecom"
        }
      }
    ],
    "roles": {
      "realm": [
        { "name": "admin", "description": "Organization administrator" },
        { "name": "editor", "description": "Can edit data" },
        { "name": "viewer", "description": "Read-only access" }
      ]
    }
  }
