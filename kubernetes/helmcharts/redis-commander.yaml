apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: redis-commander
  namespace: infra
spec:
  chart: redis-commander
  repo: https://kfirfer.github.io/charts
  version: ${REDIS_COMMANDER_CHART_VERSION}
  targetNamespace: infra
  valuesContent: |-
    replicaCount: 1
    image:
      repository: rediscommander/redis-commander
      tag: latest
      pullPolicy: Always
    redis:
      hosts: "infra:redis.infra:6379"
    service:
      type: ClusterIP
      port: 80
    resources:
      requests:
        memory: "64Mi"
        cpu: "25m"
      limits:
        memory: "128Mi"
        cpu: "200m"
