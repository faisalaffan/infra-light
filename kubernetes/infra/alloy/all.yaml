apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: infra
data:
  config.alloy: |
    logging { level = "info" }
    prometheus.scrape "infra" {
      targets = [
        {"__address__" = "victoriametrics.infra.svc:8428", "job" = "victoriametrics"},
        {"__address__" = "grafana.infra.svc:3000", "job" = "grafana"},
      ]
      forward_to = [prometheus.remote_write.default.receiver]
      scrape_interval = "15s"
    }
    prometheus.remote_write "default" {
      endpoint {
        url = "http://victoriametrics.infra.svc:8428/api/v1/write"
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alloy
  namespace: infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alloy
  template:
    metadata:
      labels:
        app: alloy
    spec:
      containers:
        - name: alloy
          image: grafana/alloy:latest
          args:
            - "run"
            - "/etc/alloy/config.alloy"
            - "--server.http.listen-addr=0.0.0.0:12345"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
              add: [NET_BIND_SERVICE]
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 12345
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: config
          configMap:
            name: alloy-config
