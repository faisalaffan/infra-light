apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cloudbeaver-data
  namespace: infra
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: cloudbeaver
  namespace: infra
spec:
  type: ClusterIP
  ports:
    - port: 8978
      targetPort: 8978
  selector:
    app: cloudbeaver
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudbeaver
  namespace: infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudbeaver
  template:
    metadata:
      labels:
        app: cloudbeaver
    spec:
      containers:
        - name: cloudbeaver
          image: dbeaver/cloudbeaver:latest
          env:
            - name: CLOUDBEAVER_FORCE_HTTPS
              value: "false"
          ports:
            - containerPort: 8978
          volumeMounts:
            - name: data
              mountPath: /opt/cloudbeaver/workspace
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /
              port: 8978
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8978
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: cloudbeaver-data
