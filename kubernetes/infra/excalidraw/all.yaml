# =========================================================================
# Excalidraw — virtual whiteboard for sketching hand-drawn like diagrams
# Image: excalidraw/excalidraw (nginx serving static React SPA, port 80)
# No persistence needed — stateless frontend-only
# =========================================================================
apiVersion: v1
kind: Service
metadata:
  name: excalidraw
  namespace: infra
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: excalidraw
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: excalidraw
  namespace: infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: excalidraw
  template:
    metadata:
      labels:
        app: excalidraw
    spec:
      containers:
        - name: excalidraw
          image: excalidraw/excalidraw:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 30
