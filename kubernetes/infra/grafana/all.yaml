apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: infra
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: ${GRAFANA_DATA_SIZE}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: infra
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: VictoriaMetrics
        type: prometheus
        uid: victoriametrics
        url: http://victoriametrics.infra.svc:8428
        access: proxy
        isDefault: true
        jsonData:
          exemplarTraceIdDestinations:
            - name: traceID
              datasourceUid: tempo

      - name: Loki
        type: loki
        uid: loki
        url: http://loki.infra.svc:3100
        access: proxy
        jsonData:
          derivedFields:
            # OTLP: traceID is a Loki label (auto-generated by OTLP gateway)
            - name: traceID
              label: traceID
              url: '$${__value.raw}'
              datasourceUid: tempo
            # Fallback: extract trace_id from log body text (non-OTLP logs)
            - name: traceID_body
              matcherRegex: '(?:trace_id|traceId|traceID|traceid)["\s:=]+["\s]*(\w{32,})'
              url: '$${__value.raw}'
              datasourceUid: tempo
            - name: profileId
              matcherRegex: '"profile_id"\s*:\s*"([0-9a-fA-F-]{8,})"'
              url: '$${__value.raw}'
              urlDisplayLabel: 'View Profile in Pyroscope'
              datasourceUid: pyroscope

      - name: Tempo
        type: tempo
        uid: tempo
        url: http://tempo.infra.svc:3200
        access: proxy
        jsonData:
          nodeGraph:
            enabled: true
          serviceMap:
            datasourceUid: victoriametrics
          tracesToLogsV2:
            datasourceUid: loki
            spanStartTimeShift: "-5m"
            spanEndTimeShift: "5m"
            tags:
              - key: service.name
                value: service_name
              - key: service.name
                value: job
          tracesToMetrics:
            datasourceUid: victoriametrics
            queries:
              - name: "Request Rate (span metrics)"
                query: 'sum(rate(traces_spanmetrics_calls_total{$${__tags}}[5m]))'
              - name: "Error Rate (span metrics)"
                query: 'sum(rate(traces_spanmetrics_calls_total{$${__tags},status_code=~"5.."}[5m]))'
          tracesToProfiles:
            datasourceUid: pyroscope
            tags:
              - key: service.name
                value: service_name

      - name: Pyroscope
        type: grafana-pyroscope-datasource
        uid: pyroscope
        url: http://pyroscope.infra.svc:4040
        access: proxy
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: infra
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: grafana
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: infra-secrets
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards-slo
              mountPath: /etc/grafana/provisioning/dashboards/slo
            - name: data
              mountPath: /var/lib/grafana
          resources:
            requests:
              memory: "${K8S_REQUESTS_MEMORY}"
              cpu: "${K8S_REQUESTS_CPU}"
            limits:
              memory: "${K8S_LIMITS_MEMORY}"
              cpu: "${K8S_LIMITS_CPU}"
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards-provider
          configMap:
            name: grafana-dashboards-provider
        - name: dashboards-slo
          configMap:
            name: grafana-dashboards-slo
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data
