# =========================================================================
# Mailpit — email testing + SMTP relay
# SMTP catch: 1025 (ClusterIP internal + Tailscale LB eksternal)
# Web UI: 8025 → Ingress (mailpit.faisalaffan.com)
# SMTP relay ke real SMTP via env vars
# =========================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mailpit-data
  namespace: infra
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: ${MAILPIT_DATA_SIZE}
---
apiVersion: v1
kind: Service
metadata:
  name: mailpit
  namespace: infra
spec:
  type: ClusterIP
  ports:
    - port: 8025
      targetPort: 8025
      name: http-ui
  selector:
    app: mailpit
---
apiVersion: v1
kind: Service
metadata:
  name: mailpit-smtp
  namespace: infra
spec:
  type: ClusterIP
  ports:
    - port: 1025
      targetPort: 1025
      name: smtp
  selector:
    app: mailpit
---
apiVersion: v1
kind: Service
metadata:
  name: mailpit-smtp-ts
  namespace: infra
  annotations:
    tailscale.com/hostname: mailpit-smtp-faisalaffan
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  ports:
    - port: 1025
      targetPort: 1025
      name: smtp
  selector:
    app: mailpit
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailpit
  namespace: infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailpit
  template:
    metadata:
      labels:
        app: mailpit
    spec:
      containers:
        - name: mailpit
          image: axllent/mailpit:latest
          ports:
            - containerPort: 8025
              name: http-ui
            - containerPort: 1025
              name: smtp
          env:
            - name: MP_DATABASE
              value: /data/mailpit.db
            - name: MP_SMTP_RELAY_HOST
              value: "${MAILPIT_SMTP_RELAY_HOST}"
            - name: MP_SMTP_RELAY_PORT
              value: "587"
            - name: MP_SMTP_RELAY_AUTH
              value: "plain"
            - name: MP_SMTP_RELAY_STARTTLS
              value: "true"
            - name: MP_SMTP_RELAY_USERNAME
              value: ""
            - name: MP_SMTP_RELAY_PASSWORD
              value: ""
            - name: MP_MAX_MESSAGES
              value: "5000"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /api/v1/info
              port: 8025
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/v1/info
              port: 8025
            initialDelaySeconds: 15
            periodSeconds: 15
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mailpit-data
