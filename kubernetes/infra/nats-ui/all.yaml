# =========================================================================
# NATS Surveyor — observability dashboard for NATS (JetStream, streams, consumers)
# Closest equivalent to Kafka UI for NATS ecosystem
# Exposed via Ingress → nats.faisalaffan.com
# =========================================================================
apiVersion: v1
kind: Service
metadata:
  name: nats-surveyor
  namespace: infra
spec:
  type: ClusterIP
  ports:
    - port: 7777
      targetPort: 7777
      name: http
  selector:
    app: nats-surveyor
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats-surveyor
  namespace: infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats-surveyor
  template:
    metadata:
      labels:
        app: nats-surveyor
    spec:
      containers:
        - name: nats-surveyor
          image: natsio/nats-surveyor:latest
          command:
            - /nats-surveyor
          args:
            - --servers
            - nats://nats.infra:4222
            - --port
            - "7777"
            - --jsz
            - all
            - --accounts
            - --gatewayz
            - --raftz
          ports:
            - containerPort: 7777
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 7777
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 7777
            initialDelaySeconds: 15
            periodSeconds: 15
