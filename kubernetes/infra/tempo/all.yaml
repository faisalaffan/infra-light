apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tempo-data
  namespace: infra
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: ${TEMPO_DATA_SIZE}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: infra
data:
  config.yaml: |
    server:
      http_listen_port: 3200

    memberlist:
      bind_port: 7946
      join_members:
        - tempo.infra.svc:7946

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: "0.0.0.0:4317"

    metrics_generator:
      ring:
        kvstore:
          store: memberlist
      processor:
        span_metrics:
          dimensions:
            - service.name
            - http.method
            - http.status_code
            - http.route
        service_graphs:
          dimensions:
            - service.name
      registry:
        external_labels:
          source: tempo
      storage:
        path: /var/tempo/generator/wal
        remote_write:
          - url: http://victoriametrics.infra.svc:8428/api/v1/write
            send_exemplars: true
            send_native_histograms: true

    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal

    overrides:
      defaults:
        metrics_generator:
          processors: [span-metrics, service-graphs]
---
apiVersion: v1
kind: Service
metadata:
  name: tempo
  namespace: infra
spec:
  type: ClusterIP
  ports:
    - port: 3200
      targetPort: 3200
      name: http
    - port: 4317
      targetPort: 4317
      name: otlp-grpc
    - port: 7946
      targetPort: 7946
      name: memberlist
  selector:
    app: tempo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
  namespace: infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tempo
  template:
    metadata:
      labels:
        app: tempo
    spec:
      containers:
        - name: tempo
          image: grafana/tempo:latest
          ports:
            - containerPort: 3200
            - containerPort: 4317
            - containerPort: 7946
          args: ["-config.file=/etc/tempo/config.yaml"]
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: config
              mountPath: /etc/tempo
            - name: data
              mountPath: /var/tempo
          resources:
            requests:
              memory: "${K8S_REQUESTS_MEMORY}"
              cpu: "${K8S_REQUESTS_CPU}"
            limits:
              memory: "${K8S_LIMITS_MEMORY}"
              cpu: "${K8S_LIMITS_CPU}"
      volumes:
        - name: config
          configMap:
            name: tempo-config
        - name: data
          persistentVolumeClaim:
            claimName: tempo-data
