apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: infra
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: ${GRAFANA_DATA_SIZE:-5Gi}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: infra
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: VictoriaMetrics
        type: prometheus
        uid: victoriametrics
        url: http://victoriametrics.infra.svc:8428
        access: proxy
        isDefault: true
      - name: Loki
        type: loki
        uid: loki
        url: http://loki.infra.svc:3100
        access: proxy
      - name: Tempo
        type: tempo
        uid: tempo
        url: http://tempo.infra.svc:3200
        access: proxy
      - name: Pyroscope
        type: grafana-pyroscope-datasource
        uid: pyroscope
        url: http://pyroscope.infra.svc:4040
        access: proxy
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: infra
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: grafana
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: infra-secrets
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: data
              mountPath: /var/lib/grafana
          resources:
            requests:
              memory: "${K8S_REQUESTS_MEMORY:-128Mi}"
              cpu: "${K8S_REQUESTS_CPU:-100m}"
            limits:
              memory: "${K8S_LIMITS_MEMORY:-512Mi}"
              cpu: "${K8S_LIMITS_CPU:-500m}"
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data
