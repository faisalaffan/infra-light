apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pyroscope-data
  namespace: infra
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: ${PYROSCOPE_DATA_SIZE}
---
apiVersion: v1
kind: Service
metadata:
  name: pyroscope
  namespace: infra
spec:
  type: ClusterIP
  ports:
    - port: 4040
      targetPort: 4040
  selector:
    app: pyroscope
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pyroscope
  namespace: infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pyroscope
  template:
    metadata:
      labels:
        app: pyroscope
    spec:
      containers:
        - name: pyroscope
          image: grafana/pyroscope:latest
          ports:
            - containerPort: 4040
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: "${K8S_REQUESTS_MEMORY}"
              cpu: "${K8S_REQUESTS_CPU}"
            limits:
              memory: "${K8S_LIMITS_MEMORY}"
              cpu: "${K8S_LIMITS_CPU}"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pyroscope-data
