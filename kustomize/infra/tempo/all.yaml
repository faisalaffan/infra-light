apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tempo-data
  namespace: infra
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: ${TEMPO_DATA_SIZE:-10Gi}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: infra
data:
  config.yaml: |
    server:
      http_listen_port: 3200
    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: "0.0.0.0:4317"
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal
---
apiVersion: v1
kind: Service
metadata:
  name: tempo
  namespace: infra
spec:
  type: ClusterIP
  ports:
    - port: 3200
      targetPort: 3200
      name: http
    - port: 4317
      targetPort: 4317
      name: otlp-grpc
  selector:
    app: tempo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
  namespace: infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tempo
  template:
    metadata:
      labels:
        app: tempo
    spec:
      containers:
        - name: tempo
          image: grafana/tempo:latest
          ports:
            - containerPort: 3200
            - containerPort: 4317
          args: ["-config.file=/etc/tempo/config.yaml"]
          volumeMounts:
            - name: config
              mountPath: /etc/tempo
            - name: data
              mountPath: /var/tempo
          resources:
            requests:
              memory: "${K8S_REQUESTS_MEMORY:-128Mi}"
              cpu: "${K8S_REQUESTS_CPU:-100m}"
            limits:
              memory: "${K8S_LIMITS_MEMORY:-512Mi}"
              cpu: "${K8S_LIMITS_CPU:-500m}"
      volumes:
        - name: config
          configMap:
            name: tempo-config
        - name: data
          persistentVolumeClaim:
            claimName: tempo-data
