apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: victoriametrics-data
  namespace: infra
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: ${VM_DATA_SIZE}
---
apiVersion: v1
kind: Service
metadata:
  name: victoriametrics
  namespace: infra
spec:
  type: ClusterIP
  ports:
    - port: 8428
      targetPort: 8428
  selector:
    app: victoriametrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: victoriametrics
  namespace: infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: victoriametrics
  template:
    metadata:
      labels:
        app: victoriametrics
    spec:
      containers:
        - name: victoriametrics
          image: victoriametrics/victoria-metrics:latest
          ports:
            - containerPort: 8428
          args:
            - "--storageDataPath=/storage"
            - "--retentionPeriod=${VM_RETENTION}"
          volumeMounts:
            - name: data
              mountPath: /storage
          resources:
            requests:
              memory: "${K8S_REQUESTS_MEMORY}"
              cpu: "${K8S_REQUESTS_CPU}"
            limits:
              memory: "${K8S_LIMITS_MEMORY}"
              cpu: "${K8S_LIMITS_CPU}"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: victoriametrics-data
