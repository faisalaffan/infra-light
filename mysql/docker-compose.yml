services:
  mysql:
    image: mysql:8.4
    container_name: mysql-all
    hostname: mysql-all
    restart: unless-stopped
    ports:
      - "3306:3306"
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret_2026}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-appdb}
      MYSQL_USER: ${MYSQL_USER:-appuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-appuser_secret_2026}
    volumes:
      - ./data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_secret_2026}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - mysql-net

networks:
  mysql-net:
    driver: bridge
    name: mysql-net
