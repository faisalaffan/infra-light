# ============================================================
# LVTP + Alloy — Observability Stack
# Semua variabel dari root DEVOPS/.env
# ============================================================

services:
  victoriametrics:
    image: victoriametrics/victoria-metrics:latest
    container_name: victoriametrics
    restart: unless-stopped
    ports:
      - "${VM_PORT}:8428"
    volumes:
      - ./data/victoriametrics:/victoria-metrics-data
    command:
      - "--storageDataPath=/victoria-metrics-data"
      - "--retentionPeriod=${VM_RETENTION}"
      - "--httpListenAddr=:8428"
      - "--search.maxUniqueTimeseries=300000"
      - "--search.maxQueryDuration=30s"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8428/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - observability-net
    deploy:
      resources:
        limits:
          memory: 512M

  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    ports:
      - "${LOKI_PORT}:3100"
    volumes:
      - ./data/loki:/loki
      - ./loki/config.yaml:/etc/loki/config.yaml:ro
    command: "-config.file=/etc/loki/config.yaml"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - observability-net
    deploy:
      resources:
        limits:
          memory: 512M

  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    restart: unless-stopped
    ports:
      - "${TEMPO_PORT}:3200"
    volumes:
      - ./data/tempo:/var/tempo
      - ./tempo/config.yaml:/etc/tempo/config.yaml:ro
    command: "-config.file=/etc/tempo/config.yaml"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3200/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - observability-net
    deploy:
      resources:
        limits:
          memory: 512M

  pyroscope:
    image: grafana/pyroscope:latest
    container_name: pyroscope
    restart: unless-stopped
    ports:
      - "${PYROSCOPE_PORT}:4040"
    volumes:
      - ./data/pyroscope:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4040/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - observability-net
    deploy:
      resources:
        limits:
          memory: 512M

  grafana:
    image: grafana/grafana:latest
    container_name: grafana-obs
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT}:3000"
    env_file:
      - ../.env
      - .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_INSTALL_PLUGINS: ${GRAFANA_PLUGINS}
      GF_AUTH_ANONYMOUS_ENABLED: "${GRAFANA_ANONYMOUS_ENABLED}"
      GF_AUTH_ANONYMOUS_ORG_ROLE: ${GRAFANA_ANONYMOUS_ROLE}
      GF_FEATURE_TOGGLES_ENABLE: ${GRAFANA_FEATURE_TOGGLES}
    volumes:
      - ./data/grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - observability-net
    deploy:
      resources:
        limits:
          memory: 512M

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    restart: unless-stopped
    ports:
      - "${ALLOY_PORT}:12345"
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
    command:
      - "run"
      - "/etc/alloy/config.alloy"
      - "--server.http.listen-addr=0.0.0.0:12345"
    networks:
      - observability-net
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  observability-net:
    driver: bridge
    name: observability-net
