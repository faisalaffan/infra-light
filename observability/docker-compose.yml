# ============================================================
# LVTP + Alloy — Observability Stack (Self-Hosted)
# VictoriaMetrics + Loki + Tempo + Pyroscope + Grafana + Alloy
# ============================================================

services:
  # ------------------------------------------------------------------
  # VictoriaMetrics — Metrics (single binary, Prometheus-compatible)
  # ------------------------------------------------------------------
  victoriametrics:
    image: victoriametrics/victoria-metrics:latest
    container_name: victoriametrics
    restart: unless-stopped
    ports:
      - "8428:8428"
    volumes:
      - ./data/victoriametrics:/victoria-metrics-data
    command:
      - "--storageDataPath=/victoria-metrics-data"
      - "--retentionPeriod=${VICTORIAMETRICS_RETENTION:-30d}"
      - "--httpListenAddr=:8428"
      - "--search.maxUniqueTimeseries=300000"
      - "--search.maxQueryDuration=30s"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8428/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - observability-net
    deploy:
      resources:
        limits:
          memory: 512M

  # ------------------------------------------------------------------
  # Loki — Logs (Grafana Loki)
  # ------------------------------------------------------------------
  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./data/loki:/loki
      - ./loki/config.yaml:/etc/loki/config.yaml:ro
    command: "-config.file=/etc/loki/config.yaml"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - observability-net
    deploy:
      resources:
        limits:
          memory: 512M

  # ------------------------------------------------------------------
  # Tempo — Traces (Grafana Tempo)
  # ------------------------------------------------------------------
  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    restart: unless-stopped
    ports:
      - "3200:3200"   # HTTP query
    volumes:
      - ./data/tempo:/var/tempo
      - ./tempo/config.yaml:/etc/tempo/config.yaml:ro
    command: "-config.file=/etc/tempo/config.yaml"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3200/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - observability-net
    deploy:
      resources:
        limits:
          memory: 512M

  # ------------------------------------------------------------------
  # Pyroscope — Profiles (Continuous Profiling)
  # ------------------------------------------------------------------
  pyroscope:
    image: grafana/pyroscope:latest
    container_name: pyroscope
    restart: unless-stopped
    ports:
      - "4040:4040"
    volumes:
      - ./data/pyroscope:/data
    environment:
      - PYROSCOPE_BLOCKS_STORAGE_BACKEND=filesystem
      - PYROSCOPE_BLOCKS_STORAGE_FILESYSTEM_DIR=/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4040/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - observability-net
    deploy:
      resources:
        limits:
          memory: 512M

  # ------------------------------------------------------------------
  # Grafana — Unified Dashboard
  # ------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: grafana-obs
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin_secret_2026}
      GF_INSTALL_PLUGINS: grafana-pyroscope-app
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_FEATURE_TOGGLES_ENABLE: "accessControlOnCall,traceToMetrics,traceToProfiles,traceQLStreaming,correlations"
    volumes:
      - ./data/grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - observability-net
    deploy:
      resources:
        limits:
          memory: 512M

  # ------------------------------------------------------------------
  # Alloy — Single Collector (Metrics + Logs + Traces + Profiles)
  # ------------------------------------------------------------------
  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    restart: unless-stopped
    ports:
      - "12345:12345"  # Alloy self-metrics
    # OTLP/Loki ports exposed internally on observability-net only
    # Apps outside Docker: send to localhost:4317 (Tempo) or localhost:4319 (Alloy OTLP)

    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
    command:
      - "run"
      - "/etc/alloy/config.alloy"
      - "--server.http.listen-addr=0.0.0.0:12345"
    networks:
      - observability-net
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  observability-net:
    driver: bridge
    name: observability-net
