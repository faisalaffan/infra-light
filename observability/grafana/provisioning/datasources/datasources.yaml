apiVersion: 1

datasources:
  - name: VictoriaMetrics
    type: prometheus
    uid: victoriametrics
    url: http://victoriametrics:8428
    access: proxy
    isDefault: true
    jsonData:
      timeInterval: "15s"
      prometheusType: "VictoriaMetrics"
      prometheusVersion: "2.45.0"

  - name: Loki
    type: loki
    uid: loki
    url: http://loki:3100
    access: proxy
    jsonData:
      maxLines: 1000
      derivedFields:
        - datasourceUid: tempo
          matcherRegex: "(?:trace_id|traceId|traceid|traceID)[\"'=: ]+(\\w{32})"
          name: TraceID
          url: "$${__value.raw}"

  - name: Tempo
    type: tempo
    uid: tempo
    url: http://tempo:3200
    access: proxy
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
        filterByTraceID: false
        filterBySpanID: false
        customQuery: false
        tags:
          - key: service.name
            value: job
        query: |-
          {job="${__span.tags["service.name"]}"}
      tracesToMetrics:
        datasourceUid: victoriametrics
        queries:
          - name: "Request Rate"
            query: "rate(http_requests_total{service=\"$${__span.tags[\"service.name\"]}\"}[5m])"
      serviceMap:
        datasourceUid: victoriametrics
      nodeGraph:
        enabled: true

  - name: Pyroscope
    type: grafana-pyroscope-datasource
    uid: pyroscope
    url: http://pyroscope:4040
    access: proxy
