# ============================================================
# PostgreSQL 17 Custom Configuration — All Features Enabled
# ============================================================

# ------------------------------------------------------------------
# Connections & Authentication
# ------------------------------------------------------------------
listen_addresses = '*'              # Expose to all interfaces
max_connections = 500               # High connection pool
superuser_reserved_connections = 10
password_encryption = 'scram-sha-256'

# ------------------------------------------------------------------
# Memory & Resource Usage
# ------------------------------------------------------------------
shared_buffers = 1GB                # 25% of available RAM recommended
effective_cache_size = 3GB          # 75% of available RAM recommended
work_mem = 64MB                     # Per-operation sort memory
maintenance_work_mem = 256MB        # VACUUM, CREATE INDEX, etc.
hash_mem_multiplier = 2.0
huge_pages = try                    # Huge pages if available

# ------------------------------------------------------------------
# WAL (Write-Ahead Log)
# ------------------------------------------------------------------
wal_level = logical                 # Required for replication, pglogical, CDC
max_wal_size = 4GB
min_wal_size = 1GB
wal_buffers = 16MB
checkpoint_completion_target = 0.9

# ------------------------------------------------------------------
# Planner & Query Tuning
# ------------------------------------------------------------------
random_page_cost = 1.1              # Assume SSD storage
effective_io_concurrency = 200      # SSD concurrency
default_statistics_target = 500     # Better query plans
seq_page_cost = 1.0

# ------------------------------------------------------------------
# Parallel Query Execution
# ------------------------------------------------------------------
max_parallel_workers = 8
max_parallel_workers_per_gather = 4
max_parallel_maintenance_workers = 4
parallel_leader_participation = on

# ------------------------------------------------------------------
# Logging & Monitoring
# ------------------------------------------------------------------
log_destination = 'stderr'
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_min_duration_statement = 1000   # Log queries > 1s
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0                  # Log all temp file usage
log_autovacuum_min_duration = 0
log_line_prefix = '%m [%p] %q%u@%d '
track_activities = on
track_counts = on
track_io_timing = on
track_functions = all
track_wal_io_timing = on

# ------------------------------------------------------------------
# Autovacuum (Aggressive)
# ------------------------------------------------------------------
autovacuum = on
autovacuum_max_workers = 5
autovacuum_naptime = 30s
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.025
autovacuum_vacuum_cost_limit = 2000
vacuum_cost_limit = 200

# ------------------------------------------------------------------
# Shared Preload Libraries — ALL extensions
# ------------------------------------------------------------------
shared_preload_libraries = 'pg_stat_statements,pg_cron,pglogical,pgaudit,timescaledb,vector,auto_explain,pg_prewarm,pg_wait_sampling,pg_stat_kcache'

# ------------------------------------------------------------------
# Extension-specific settings
# ------------------------------------------------------------------
# pg_stat_statements
pg_stat_statements.max = 10000
pg_stat_statements.track = all
pg_stat_statements.track_utility = on
pg_stat_statements.track_planning = on

# pg_cron
cron.database_name = 'postgres'
cron.log_run = on

# pgAudit
pgaudit.log = 'all'
pgaudit.log_catalog = on
pgaudit.log_level = 'notice'
pgaudit.log_parameter = on

# auto_explain
auto_explain.log_min_duration = 1000
auto_explain.log_analyze = on
auto_explain.log_buffers = on
auto_explain.log_triggers = on
auto_explain.log_verbose = on
auto_explain.log_settings = on

# pglogical
pglogical.conflict_log_level = 'notice'

# ------------------------------------------------------------------
# Replication
# ------------------------------------------------------------------
max_replication_slots = 20
max_wal_senders = 20
wal_sender_timeout = 60s
wal_receiver_timeout = 60s
hot_standby = on
hot_standby_feedback = on
wal_keep_size = 1GB

# ------------------------------------------------------------------
# Client Defaults
# ------------------------------------------------------------------
datestyle = 'iso, mdy'
timezone = 'Asia/Jakarta'
default_text_search_config = 'pg_catalog.english'
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'
bytea_output = 'hex'

# ------------------------------------------------------------------
# Advanced / Performance
# ------------------------------------------------------------------
jit = on
synchronize_seqscans = on
enable_partition_pruning = on
enable_partitionwise_aggregate = on
enable_partitionwise_join = on
